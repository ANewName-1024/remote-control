# Nacos 配置模板
# 将此文件复制到各服务的 src/main/resources/bootstrap.yml

# ==================== Nacos 配置 ====================
# 取消注释以下配置以启用 Nacos 配置中心

spring:
  application:
    name: @project.artifactId@
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
        # 共享配置
        shared-configs:
          - data-id: shared-config.yml
            group: SHARED_GROUP
            refresh: true
        # 扩展配置
        extension-configs:
          - data-id: database-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: jwt-config.yml
            group: DEFAULT_GROUP
            refresh: true

# ==================== 本地备用配置 ====================
# 当 Nacos 不可用时使用
spring.config.import: optional:file:./config
spring.cloud.config.enabled: false
spring.cloud.config.import-check.enabled: false

