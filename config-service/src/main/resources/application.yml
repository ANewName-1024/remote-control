server:
  port: 8082

spring:
  application:
    name: config-service
  
  # 使用 H2 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

# JWT 配置
config:
  jwt:
    secret: testSecretKeyForJWTTokenGenerationMustBeLongEnough12345
    expiration: 86400000

# 日志配置
logging:
  level:
    com.example.config: DEBUG
