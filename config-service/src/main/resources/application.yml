server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: config-service
  
  # 禁用默认的 composite 配置
  profiles:
    active: native
  
  # Spring Cloud Config Server 配置 - 使用本地文件系统
  cloud:
    config:
      server:
        # 使用本地文件系统（不需要 Git）
        native:
          search-locations: file:///${CONFIG_REPO_PATH:D:/Cache/config-repo}
        # 禁用 git
        git:
          enabled: false
        # 启用健康检查
        health:
          repositories:
            - name: user-service
              label: master
            - name: gateway
              label: master
            - name: ops-service
              label: master
  
  # 数据源配置 - 自身配置（不通过配置中心）
  datasource:
    url: jdbc:postgresql://${DB_HOST:8.137.116.121}:${DB_PORT:8432}/${DB_NAME:business_db}?ssl=false
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD:NewPass2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT 配置
config:
  jwt:
    secret: ${CONFIG_JWT_SECRET:ConfigServiceJWTSecretKey2024ChangeInProduction}
    expiration: ${CONFIG_JWT_EXPIRATION:86400000}

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.example.config: INFO
    org.springframework.cloud.config: DEBUG
