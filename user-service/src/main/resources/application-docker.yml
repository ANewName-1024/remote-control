server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:business_db}?ssl=true&sslmode=verify-full&sslrootcert=/app/server.crt
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD:Business@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      ssl: true
      sslrootcert: /app/server.crt
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://admin:Eureka@2024!Secure@localhost:9000/eureka/}
  instance:
    prefer-ip-address: true
