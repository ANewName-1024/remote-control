spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
      config:
        import-check:
          enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:8.137.116.121}:${DB_PORT:8432}/${DB_NAME:business_db}
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD:NewPass2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:UserServiceJWTSecretKey2024ChangeInProduction}
  expiration: 1800000
  refresh-expiration: 604800000

logging:
  level:
    com.example.user: DEBUG
