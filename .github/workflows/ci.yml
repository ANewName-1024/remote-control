name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server-tests:
    name: Server (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci

      - name: HTTP API tests
        run: |
          cd ..
          node test_http_api.js

      - name: WebSocket protocol tests
        run: |
          cd ..
          node test_ws_protocol.js

      - name: Path security tests
        run: |
          cd ..
          node test_path_security.js

      - name: E2E flow tests
        run: |
          cd ..
          node test_e2e_flow.js

      - name: Static Deploy smoke tests
        run: |
          cd ..
          node smoke_test.js

      - name: Upload (multer 2.x) tests
        run: |
          cd ..
          node upload_test.js

  agent-tests:
    name: Agent (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install agent deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install dxcam comtypes  # backend extras; harmless on Linux

      - name: Unit tests (delta encoder, mouse/keyboard, protocol)
        run: |
          cd agent
          PYTHONPATH=.. python -m unittest discover tests -v

      - name: Helper and service module import sanity
        run: |
          PYTHONPATH=. python -c "import sys; sys.path.insert(0, '..'); from agent import service, helper, capture, ws_bridge, protocol, enhanced_screen, input_inject; print('all 7 agent modules import OK')"
