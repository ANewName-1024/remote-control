server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**

eureka:
  client:
    service-url:
      defaultZone: http://admin:Eureka@2024!Secure@8.137.116.121:9000/eureka/
  instance:
    prefer-ip-address: true
