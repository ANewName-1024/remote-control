spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: public
        enabled: true
        register-enabled: true
      config:
        namespace: public
        enabled: true
        file-extension: yml
        refresh-enabled: true
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/user/**
            - id: config-service
              uri: lb://config-service
              predicates:
                - Path=/config/**
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:GatewayJWTSecretKey2024ChangeInProduction}
  expiration: 1800000

# 本地备用配置 (Nacos 不可用时)
spring.config.import: optional:file:./config

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
