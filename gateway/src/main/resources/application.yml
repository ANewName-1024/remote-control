spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
      config:
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/user/**
            - id: config-service
              uri: http://localhost:8082
              predicates:
                - Path=/config/**

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:GatewayJWTSecretKey2024ChangeInProduction}
  expiration: 1800000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
