server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:classpath:cert/keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:server}
    http-to-https-redirect: ${HTTP_TO_HTTPS_REDIRECT:false}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**,/oauth/**,/oidc/**
          filters:
            - StripPrefix=0
        - id: config-service
          uri: lb://config-service
          predicates:
            - Path=/config/**,/openclaw/**
          filters:
            - StripPrefix=0
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: false
            max-age: 3600

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:EurekaNew2024}@${EUREKA_HOST:8.137.116.121}:${EUREKA_PORT:9000}/eureka/
  instance:
    prefer-ip-address: true
    secure-port-enabled: ${SSL_ENABLED:false}
    secure-port: ${SERVER_PORT:8080}

oidc:
  issuer: ${OIDC_ISSUER:http://localhost:8081}
  jwks-uri: ${OIDC_ISSUER:http://localhost:8081}/oauth/jwks
  issuer-uri: ${OIDC_ISSUER:http://localhost:8081}

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeLongEnough12345}
  exclude-paths: >-
    /user/auth/login,
    /user/auth/register,
    /user/auth/refresh,
    /oauth/token,
    /oauth/authorize,
    /oauth/.well-known/**,
    /oauth/jwks,
    /oauth/client/register,
    /actuator/**,
    /health

cert:
  rotation:
    enabled: ${CERT_ROTATION_ENABLED:true}
    interval-days: ${CERT_ROTATION_INTERVAL:90}
