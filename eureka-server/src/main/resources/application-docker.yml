server:
  port: 9000

spring:
  application:
    name: eureka-server
  security:
    user:
      name: admin
      password: ${EUREKA_USERNAME:Eureka@2024!Secure}
  profiles:
    include: docker

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:9000/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 60000
